# Nombre del workflow
name: CI/CD Pipeline (Build y Deploy Prototipo + Main)

# 1. TRIGGER ACTUALIZADO
on:
  push:
    branches:
      - main       # <-- ¡AÑADIDO! Ahora también se activa en push a 'main'
      - prototipo 
  pull_request:
    branches:
      - main       # <-- Para las reglas de protección de rama

# Permisos globales
permissions:
  contents: read
  # Los permisos de 'pages' y 'id-token' se moverán
  # a ser específicos de cada job para mayor seguridad.

# Trabajos (Jobs)
jobs:
  # --- TRABAJO 1: CONSTRUIR (Se mantiene casi igual) ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Configura Node.js y activa el caché de PNPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      # --- CAMBIO IMPORTANTE ---
      # Sube un artefacto genérico que CUALQUIER job pueda descargar
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact # Un nombre genérico
          path: ./dist # La carpeta que generó el build

  # --- TRABAJO 2: DESPLEGAR A GITHUB PAGES (Prototipo) ---
  deploy-github-pages:
    needs: build # Depende del job 'build'
    
    # Condición: Solo corre en push a 'prototipo'
    if: github.event_name == 'push' && github.ref == 'refs/heads/prototipo'
    
    # Permisos específicos para este job
    permissions:
      pages: write 
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga el artefacto genérico
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./dist # Lo descarga en una carpeta 'dist'

      # 2. Sube el artefacto en el formato especial de "Pages"
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 3. Despliega en Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # --- TRABAJO 3: DESPLEGAR A PRODUCCIÓN (Main) ---
  deploy-production:
    needs: build # También depende del job 'build'

    # Condición: Solo corre en push a 'main'
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # ¡AQUÍ! Usa el entorno 'production' que creaste
    environment:
      name: Production 
      
    runs-on: ubuntu-latest
    steps:
      - name: Llegamos a producción
        run: echo "Desplegando a producción..."
